name: Publish Pterodactyl Yolk

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-pterodactyl-yolk.yml"
      - "docker/pterodactyl-yolk/Dockerfile"
      - "pterodactyl-egg/egg-cat-realm-server.json"
      - "pterodactyl-egg/EGG_REPOSITORY.md"
      - "docs/PTERODACTYL_RUNTIME_IMAGE.md"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: nodejs_20
            base_image: ghcr.io/pterodactyl/yolks:nodejs_20
          - tag: nodejs_24
            base_image: ghcr.io/pterodactyl/yolks:nodejs_24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pterodactyl-yolk/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catrealm-selfhostable-server-yolk:${{ matrix.tag }}

